AWSTemplateFormatVersion: "2010-09-09"
Description: Bootstrap resources for packaging and creating the shared AgentCore runtime.

Parameters:
  DeploymentEnvironment:
    Type: String
    AllowedValues:
      - sandbox
      - preprod
      - prod
    Default: sandbox

Resources:
  RuntimeArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub flutter-agentcore-${AWS::AccountId}-${AWS::Region}-${DeploymentEnvironment}
      VersioningConfiguration:
        Status: Enabled

  RuntimeExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub flutter-agentcore-runtime-${DeploymentEnvironment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
              ArnLike:
                aws:SourceArn: !Sub arn:${AWS::Partition}:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:*
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AgentCoreRuntimeArtifactAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:ListBucket
                Resource:
                  - !GetAtt RuntimeArtifactsBucket.Arn
                  - !Sub ${RuntimeArtifactsBucket.Arn}/*

Outputs:
  RuntimeArtifactsBucketName:
    Value: !Ref RuntimeArtifactsBucket
  RuntimeExecutionRoleArn:
    Value: !GetAtt RuntimeExecutionRole.Arn
