name: ci-quality-gates

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  schedule:
    - cron: "0 2 * * *"

env:
  UV_PYTHON_VERSION: "3.12.7"
  UV_REQUIREMENTS_FILE: "requirements.txt"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      strict_r3: ${{ steps.filter.outputs.strict_r3 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect strict lane changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            strict_r3:
              - 'contracts/schemas/**'
              - 'capability-definitions/**'
              - 'safety-envelopes/**'
              - 'workflow-contracts/**'
              - 'evaluation-packs/**'
              - 'scripts/linters/**'
              - 'scripts/run-ci-quality-gates.sh'
              - 'scripts/run-mutation-gate.py'
              - 'tests/**'
              - 'docs/references/flutter-design-*.md'
              - 'docs/references/dev-setup.md'
              - 'docs/references/sdlc-use-case.md'
              - 'infra/**'

  preflight:
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.0"

      - name: Cache uv artifacts
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ env.UV_PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ env.UV_PYTHON_VERSION }}-

      - name: Install root Node dependencies
        run: npm ci

      - name: Install infra Node dependencies
        run: npm --prefix infra ci

      - name: Build uv gate environment
        run: |
          uv python install "$UV_PYTHON_VERSION"
          uv venv --python "$UV_PYTHON_VERSION" .ci-venv
          uv pip install --python .ci-venv/bin/python -r "$UV_REQUIREMENTS_FILE"
          .ci-venv/bin/python --version

      - name: Run preflight lane
        run: UV_VENV_PYTHON_BIN=.ci-venv/bin/python bash scripts/run-ci-quality-gates.sh --lane=preflight

  fast_r1r2:
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.0"

      - name: Cache uv artifacts
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ env.UV_PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ env.UV_PYTHON_VERSION }}-

      - name: Install root Node dependencies
        run: npm ci

      - name: Install infra Node dependencies
        run: npm --prefix infra ci

      - name: Build uv gate environment
        run: |
          uv python install "$UV_PYTHON_VERSION"
          uv venv --python "$UV_PYTHON_VERSION" .ci-venv
          uv pip install --python .ci-venv/bin/python -r "$UV_REQUIREMENTS_FILE"
          .ci-venv/bin/python --version

      - name: Run fast-r1r2 lane
        run: UV_VENV_PYTHON_BIN=.ci-venv/bin/python bash scripts/run-ci-quality-gates.sh --lane=fast-r1r2

  quality_gates_core:
    runs-on: ubuntu-latest
    needs: fast_r1r2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.0"

      - name: Cache uv artifacts
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ env.UV_PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ env.UV_PYTHON_VERSION }}-

      - name: Install root Node dependencies
        run: npm ci

      - name: Install infra Node dependencies
        run: npm --prefix infra ci

      - name: Build uv gate environment
        run: |
          uv python install "$UV_PYTHON_VERSION"
          uv venv --python "$UV_PYTHON_VERSION" .ci-venv
          uv pip install --python .ci-venv/bin/python -r "$UV_REQUIREMENTS_FILE"
          .ci-venv/bin/python --version

      - name: Run quality-gates-core lane
        run: UV_VENV_PYTHON_BIN=.ci-venv/bin/python bash scripts/run-ci-quality-gates.sh --lane=quality-gates-core

  strict_r3:
    runs-on: ubuntu-latest
    needs:
      - changes
      - quality_gates_core
    if: >-
      github.event_name == 'schedule' ||
      startsWith(github.ref, 'refs/tags/v') ||
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'pull_request' &&
        (
          contains(github.event.pull_request.labels.*.name, 'ci:full') ||
          needs.changes.outputs.strict_r3 == 'true'
        )
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.0"

      - name: Cache uv artifacts
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ env.UV_PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ env.UV_PYTHON_VERSION }}-

      - name: Install root Node dependencies
        run: npm ci

      - name: Install infra Node dependencies
        run: npm --prefix infra ci

      - name: Build uv gate environment
        run: |
          uv python install "$UV_PYTHON_VERSION"
          uv venv --python "$UV_PYTHON_VERSION" .ci-venv
          uv pip install --python .ci-venv/bin/python -r "$UV_REQUIREMENTS_FILE"
          .ci-venv/bin/python --version

      - name: Run strict-r3 lane
        run: UV_VENV_PYTHON_BIN=.ci-venv/bin/python bash scripts/run-ci-quality-gates.sh --lane=strict-r3

  nightly_full:
    runs-on: ubuntu-latest
    needs:
      - preflight
      - fast_r1r2
      - quality_gates_core
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.0"

      - name: Cache uv artifacts
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ env.UV_PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ env.UV_PYTHON_VERSION }}-

      - name: Install root Node dependencies
        run: npm ci

      - name: Install infra Node dependencies
        run: npm --prefix infra ci

      - name: Build uv gate environment
        run: |
          uv python install "$UV_PYTHON_VERSION"
          uv venv --python "$UV_PYTHON_VERSION" .ci-venv
          uv pip install --python .ci-venv/bin/python -r "$UV_REQUIREMENTS_FILE"
          .ci-venv/bin/python --version

      - name: Run nightly-full lane
        run: UV_VENV_PYTHON_BIN=.ci-venv/bin/python bash scripts/run-ci-quality-gates.sh --lane=nightly-full

  release_hardening:
    runs-on: ubuntu-latest
    needs:
      - preflight
      - fast_r1r2
      - quality_gates_core
      - strict_r3
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.0"

      - name: Cache uv artifacts
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ env.UV_PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ env.UV_PYTHON_VERSION }}-

      - name: Install root Node dependencies
        run: npm ci

      - name: Install infra Node dependencies
        run: npm --prefix infra ci

      - name: Build uv gate environment
        run: |
          uv python install "$UV_PYTHON_VERSION"
          uv venv --python "$UV_PYTHON_VERSION" .ci-venv
          uv pip install --python .ci-venv/bin/python -r "$UV_REQUIREMENTS_FILE"
          .ci-venv/bin/python --version

      - name: Run release-hardening lane
        run: UV_VENV_PYTHON_BIN=.ci-venv/bin/python bash scripts/run-ci-quality-gates.sh --lane=release-hardening
