name: ci-quality-gates

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  schedule:
    - cron: "0 2 * * *"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      extended: ${{ steps.filter.outputs.extended }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect extended lane changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            extended:
              - 'infra/**'
              - 'scripts/linters/**'
              - 'evals/**'

  preflight:
    runs-on: ubuntu-latest
    needs: changes
    env:
      MODEL_ID: eu.amazon.nova-lite-v1:0
      BEDROCK_MODEL_ID: eu.amazon.nova-lite-v1:0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install root Node dependencies
        run: npm ci

      - name: Install infra Node dependencies
        run: npm --prefix infra ci

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run preflight lane
        run: bash scripts/run-ci-quality-gates.sh --lane=preflight

  fast-r1r2:
    runs-on: ubuntu-latest
    needs: preflight
    env:
      MODEL_ID: eu.amazon.nova-lite-v1:0
      BEDROCK_MODEL_ID: eu.amazon.nova-lite-v1:0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install root Node dependencies
        run: npm ci

      - name: Install infra Node dependencies
        run: npm --prefix infra ci

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run fast-r1r2 lane
        run: bash scripts/run-ci-quality-gates.sh --lane=fast-r1r2

  quality-gates-core:
    runs-on: ubuntu-latest
    needs: fast-r1r2
    env:
      MODEL_ID: eu.amazon.nova-lite-v1:0
      BEDROCK_MODEL_ID: eu.amazon.nova-lite-v1:0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install root Node dependencies
        run: npm ci

      - name: Install infra Node dependencies
        run: npm --prefix infra ci

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run quality-gates-core lane
        run: bash scripts/run-ci-quality-gates.sh --lane=quality-gates-core

  extended-r3r4:
    runs-on: ubuntu-latest
    needs:
      - changes
      - quality-gates-core
    if: >-
      github.event_name == 'schedule' ||
      startsWith(github.ref, 'refs/tags/v') ||
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'pull_request' &&
        (
          contains(github.event.pull_request.labels.*.name, 'ci:full') ||
          needs.changes.outputs.extended == 'true'
        )
      )
    env:
      MODEL_ID: eu.amazon.nova-lite-v1:0
      BEDROCK_MODEL_ID: eu.amazon.nova-lite-v1:0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install root Node dependencies
        run: npm ci

      - name: Install infra Node dependencies
        run: npm --prefix infra ci

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run extended-r3r4 lane
        run: bash scripts/run-ci-quality-gates.sh --lane=extended-r3r4

  nightly-full:
    runs-on: ubuntu-latest
    needs:
      - preflight
      - fast-r1r2
      - quality-gates-core
    if: github.event_name == 'schedule'
    env:
      MODEL_ID: eu.amazon.nova-lite-v1:0
      BEDROCK_MODEL_ID: eu.amazon.nova-lite-v1:0
      RUN_MUTATION_GATE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install root Node dependencies
        run: npm ci

      - name: Install infra Node dependencies
        run: npm --prefix infra ci

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run nightly-full lane
        run: bash scripts/run-ci-quality-gates.sh --lane=nightly-full

  release-hardening:
    runs-on: ubuntu-latest
    needs:
      - preflight
      - fast-r1r2
      - quality-gates-core
      - extended-r3r4
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      MODEL_ID: eu.amazon.nova-lite-v1:0
      BEDROCK_MODEL_ID: eu.amazon.nova-lite-v1:0
      RUN_MUTATION_GATE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install root Node dependencies
        run: npm ci

      - name: Install infra Node dependencies
        run: npm --prefix infra ci

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run release-hardening lane
        run: bash scripts/run-ci-quality-gates.sh --lane=release-hardening
